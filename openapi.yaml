openapi: 3.1.0
info:
  title: PathWiser · Career Twin Engine API
  version: 1.1.0
  description: |
    The Career Twin Engine — one API that all 9 audience modules call.
    Given a user shape, returns a cohort of similar privacy-protected trajectories,
    a deterministic aggregation of that cohort's outcomes, and an honest
    hedged narrative that explains the aggregate.

    ## The three-layer architectural claim
    1. **Retrieval** (pgvector cosine similarity over the trajectory corpus)
    2. **Aggregation** (pure deterministic functions — numbers come from here)
    3. **Explanation** (LLM only converts numbers into hedged language; validator rejects predictive verbs)

    Numbers NEVER originate from the LLM. This separation is architectural,
    not just a prompt-level constraint.

    ## For Talentbank engineers (integration notes)
    - Every AI call routes through `lib/ai/*` — swap by env var `AI_PROVIDER`
    - Every DB call routes through `lib/supabase/*` — swap the client factory
    - The engine (`lib/engine/*`) has no framework dependency — pure TypeScript
    - Grep `adoption hook` in the source to find every integration seam
  contact:
    name: PathWiser · Talentbank Tech Hackathon 2026

servers:
  - url: http://localhost:3000
    description: Local development or production-compatible container

paths:
  /api/health:
    get:
      summary: Readiness and evidence-mode status
      tags: [Operations]
      responses:
        '200': { description: Ready }
        '503': { description: Required community services are not ready }

  /api/engine/navigate:
    post:
      summary: Run the Career Twin Engine end-to-end
      description: |
        Retrieval → Aggregation → Explanation. This is THE endpoint every
        audience module calls. Framing differs by `shape.persona`.
      operationId: navigate
      tags: [Engine]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NavigateRequest'
      responses:
        '200':
          description: |
            Cohort found (possibly `cohort_too_small`) — safe to render honestly.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/NavigateResponse'
                  - $ref: '#/components/schemas/CohortTooSmallResponse'
        '400':
          description: Invalid input (Zod schema violation)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Engine or provider failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/engine/coach:
    post:
      summary: Ask a cohort-grounded career question
      tags: [Engine]
      responses:
        '200': { description: Validated answer or deterministic safe fallback }
        '400': { description: Invalid request }
        '429': { description: Rate limited }

  /api/talent/match:
    post:
      summary: Retrieve explainable employer matches
      description: Returns consented candidate profiles in connected full mode, otherwise clearly labelled modelled profiles. Account IDs and individual prediction scores are never returned.
      tags: [Employer]
      responses:
        '200': { description: Privacy-safe explainable matches }
        '400': { description: Invalid demand shape }

  /api/profile:
    get:
      summary: Read the authenticated user's shape
      tags: [Account]
      responses:
        '200': { description: Profile returned }
        '401': { description: Authentication required }
    put:
      summary: Save the authenticated user's shape
      tags: [Account]
      responses:
        '200': { description: Profile saved }
        '401': { description: Authentication required }
        '403': { description: Audience role changes require support }

  /api/account:
    get:
      summary: Export the authenticated user's portable account data
      tags: [Account, Privacy]
      responses:
        '200':
          description: JSON account export returned as a private attachment
        '401': { description: Authentication required }
        '429': { description: Export rate limited }
    delete:
      summary: Permanently delete the authenticated account and account-owned data
      tags: [Account, Privacy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation]
              properties:
                confirmation:
                  type: string
                  const: DELETE MY PATHWISER ACCOUNT
      responses:
        '200': { description: Account and account-owned data deleted }
        '400': { description: Exact confirmation phrase required }
        '401': { description: Authentication required }
        '403': { description: Cross-origin request rejected }

  /api/consent:
    get:
      summary: Read revocable consent choices
      tags: [Privacy]
      responses:
        '200': { description: Consent records returned }
        '401': { description: Authentication required }
    put:
      summary: Grant or revoke a consent choice
      tags: [Privacy]
      responses:
        '200': { description: Consent saved }
        '401': { description: Authentication required }

  /api/feedback:
    get:
      summary: Read feedback history
      tags: [Support]
      responses:
        '200': { description: Feedback returned }
    post:
      summary: Store a contextual reflection or experience rating
      tags: [Support]
      responses:
        '200': { description: Feedback saved or device persistence requested }
        '400': { description: Invalid feedback }

  /api/records:
    get:
      summary: Read durable module workflow records
      tags: [Workflows]
      parameters:
        - in: query
          name: module
          schema:
            type: string
            enum: [retention_signals, onboarding_predictor, outcome_loop, curriculum_engine, readiness_profile]
      responses:
        '200': { description: Account records returned }
        '401': { description: Authentication required }
    post:
      summary: Create or update a durable module workflow record
      tags: [Workflows]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceRecordInput'
      responses:
        '200': { description: Existing record updated }
        '201': { description: Record created }
        '401': { description: Authentication required }
    delete:
      summary: Delete a durable module workflow record
      tags: [Workflows]
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Record deleted }
        '401': { description: Authentication required }

  /api/marketplace/jobs:
    get:
      summary: Read active or explicitly modelled job listings
      tags: [Marketplace]
      responses:
        '200': { description: Listings returned with an evidence-scope label }

  /api/marketplace/companies:
    get:
      summary: Read community or explicitly modelled employer profiles
      tags: [Marketplace]
      responses:
        '200': { description: Employer profiles returned with an evidence-scope label }

  /api/marketplace/saved:
    get:
      summary: Read saved jobs and companies
      tags: [Marketplace]
      responses:
        '200': { description: Saved items returned }
        '401': { description: Authentication required }
    put:
      summary: Save or remove a marketplace item
      tags: [Marketplace]
      responses:
        '200': { description: Saved state updated }
        '401': { description: Authentication required }

  /api/operations/retention:
    post:
      summary: Purge expired operational data according to the retention schedule
      description: Hosting scheduler endpoint protected by a server-only bearer secret. The database operation is transactional and available only to the service role.
      tags: [Operations, Privacy]
      security:
        - cronBearer: []
      responses:
        '200': { description: Retention cleanup completed and counts returned }
        '401': { description: Invalid scheduler credential }
        '503': { description: Scheduler or database retention function not configured }

components:
  securitySchemes:
    cronBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    UserShape:
      type: object
      required: [persona, role, education, years_experience, state, skills, life_stage]
      properties:
        userId:      { type: string, default: anon }
        persona:     { type: string, enum: [candidate, employer, university] }
        role:        { type: string, example: "Junior Data Analyst" }
        esco_code:   { type: string, example: "2511.2" }
        onet_code:   { type: string }
        masco_code:  { type: string }
        education:   { type: string, example: "Bachelor's in Computer Science" }
        years_experience: { type: integer, minimum: 0, maximum: 60, example: 3 }
        state:       { type: string, example: "Kuala Lumpur" }
        skills:      { type: array, items: { type: string }, example: ["SQL", "Python", "Tableau"] }
        life_stage:
          type: string
          enum: [student, young_adult, early_career, mid_career, senior_career, executive]
        work_animal:
          type: string
          enum: [owl, fox, bear, dolphin, eagle, ant]
          description: Optional Menagerie Method dimension. Feeds retrieval.
        dimensions:
          type: object
          description: User-adjustable capability emphasis used by retrieval.
          properties:
            technical: { type: number, minimum: 0, maximum: 100 }
            domain: { type: number, minimum: 0, maximum: 100 }
            leadership: { type: number, minimum: 0, maximum: 100 }
            analytics: { type: number, minimum: 0, maximum: 100 }
            communication: { type: number, minimum: 0, maximum: 100 }

    NavigateRequest:
      type: object
      required: [shape]
      properties:
        shape: { $ref: '#/components/schemas/UserShape' }
        currentStepIndex: { type: integer, minimum: 0, maximum: 6, default: 0 }
        filterByLifeStage: { type: boolean, default: false }
        filterByState:     { type: boolean, default: false }
        filterBySector:    { type: string }
        k: { type: integer, minimum: 50, maximum: 2000, default: 1200 }

    NavigateResponse:
      type: object
      required: [cohort, aggregate, explanation]
      properties:
        cohort:
          type: object
          properties:
            size: { type: integer, example: 1240 }
            similarity_stats:
              type: object
              properties:
                mean:   { type: number, example: 0.87 }
                stddev: { type: number, example: 0.05 }
                min:    { type: number, example: 0.71 }
                max:    { type: number, example: 0.98 }
            filters_applied:
              type: object
              properties:
                life_stage: { type: string }
                state:      { type: string }
                sector:     { type: string }
        aggregate: { $ref: '#/components/schemas/Aggregate' }
        explanation: { $ref: '#/components/schemas/Explanation' }
        evidence:
          type: object
          properties:
            mode: { type: string, enum: [modelled, community] }
            label: { type: string }
            corpus_size: { type: integer }
            synthetic: { type: boolean }
        k_min: { type: integer, example: 50 }

    Aggregate:
      type: object
      required: [cohort_size, next_role_distribution, salary_percentiles_by_role]
      properties:
        cohort_size: { type: integer }
        next_role_distribution:
          type: array
          items:
            type: object
            properties:
              role:               { type: string }
              count:              { type: integer }
              probability:        { type: number, minimum: 0, maximum: 1 }
              esco_code:          { type: string }
              is_mycol_critical:  { type: boolean }
        salary_percentiles_by_role:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SalaryPercentiles'
        median_time_in_role_months: { type: integer }
        common_skill_bridges:
          type: array
          items:
            type: object
            properties:
              skill: { type: string }
              frequency: { type: number, minimum: 0, maximum: 1 }
              esco_skill_id: { type: string }
        trade_offs:
          type: array
          items:
            type: object
            properties:
              path_a:      { type: string }
              path_b:      { type: string }
              dimension:   { type: string, enum: [salary_ceiling, time, skill_decay, cohort_confidence] }
              description: { type: string }
        calibration_anchors:
          type: array
          items:
            type: object
            properties:
              source:    { type: string }
              reference: { type: string }
              license:   { type: string }

    SalaryPercentiles:
      type: object
      properties:
        p10:      { type: integer }
        p25:      { type: integer }
        median:   { type: integer }
        p75:      { type: integer }
        p90:      { type: integer }
        currency: { type: string, enum: [MYR] }
        monthly:  { type: boolean, const: true }

    Explanation:
      type: object
      required: [narrative, cohort_size_disclosed, ranges_disclosed, passed_validation]
      properties:
        narrative:              { type: string }
        cohort_size_disclosed:  { type: boolean }
        ranges_disclosed:       { type: boolean }
        passed_validation:      { type: boolean }
        validator_notes:
          type: array
          items: { type: string }
        generation_mode:
          type: string
          enum: [provider, template]
        fallback_reason:
          type: string

    WorkspaceRecordInput:
      type: object
      required: [module, record_type, title]
      properties:
        id: { type: string, format: uuid }
        module:
          type: string
          enum: [retention_signals, onboarding_predictor, outcome_loop, curriculum_engine, readiness_profile]
        record_type: { type: string, maxLength: 80 }
        title: { type: string, maxLength: 180 }
        status:
          type: string
          enum: [draft, active, review_due, completed, archived]
          default: active
        payload: { type: object, additionalProperties: true }
        next_review_at:
          oneOf:
            - { type: string, format: date-time }
            - { type: 'null' }

    CohortTooSmallResponse:
      type: object
      required: [cohort_too_small, cohort_size, k_min, message]
      properties:
        cohort_too_small: { type: boolean, const: true }
        cohort_size:      { type: integer }
        k_min:            { type: integer }
        message:          { type: string }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:   { type: string }
        message: { type: string }
        issues:  { type: array }

tags:
  - name: Engine
    description: The Career Twin Engine — the single seam every module calls.
  - name: Workflows
    description: Durable account records for employer and university workflows.
  - name: Marketplace
    description: Disclosed community or modelled listings, profiles, and saved items.
